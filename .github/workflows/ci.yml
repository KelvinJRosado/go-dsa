name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: make fmt-check

      - name: Vet
        run: make vet

      - name: Vet (shadow)
        run: make vet-shadow

      - name: Test & coverage
        run: make cover

      - name: Build
        run: make build

      - name: Module hygiene
        run: make tidy-check
